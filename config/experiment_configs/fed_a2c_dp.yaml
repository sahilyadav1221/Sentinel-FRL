# Federated A2C with Differential Privacy

experiment:
  name: "fed_a2c_dp_epsilon10"
  seed: 42
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  save_frequency: 5

federated:
  num_sites: 5
  communication_rounds: 300
  local_epochs: 10
  aggregation_method: "fedavg"
  site_sampling_rate: 1.0
  min_clients: 1

environment:
  episode_length: 1000

agent:
  algorithm: "a2c"
  network:
    hidden_layers: [256, 128, 64]
    activation: "relu"
  a2c:
    learning_rate: 7.0e-4
    n_steps: 5

privacy:
  enabled: true
  mechanism: "dp_sgd"
  dp_sgd:
    noise_multiplier: 1.1
    max_grad_norm: 1.0
    target_epsilon: 10.0
    target_delta: 1e-5
    secure_rng: true
  accounting:
    method: "rdp"
    track_per_site: true

compute:
  device: "auto"
  num_workers: 4
  deterministic: true

evaluation:
  frequency: 5
  num_episodes: 50
